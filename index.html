<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* HEADER */
    .header {
      padding: 20px;
      font-size: 18px;
    }

    .line {
      height: 1px;
      background: #ccc;
      margin: 0 20px;
    }

    /* MAIN IMAGE */
    .container {
      position: relative;
      padding: 20px;
    }

    .container img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* COMING SOON */
    .coming {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      letter-spacing: 1px;
    }

    /* FOOTER */
    .footer {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 14px;
    }

    .footer a {
      color: #333;
      text-decoration: none;
      border-bottom: 1px solid #333;
    }

    .footer a:hover {
      opacity: 0.6;
    }

    .username {
      margin-top: 10px;
      color: #666;
    }
  </style>
</head>

<body>

  <!-- Nome -->
  <div class="header">Iacopo Pasqui</div>
  <div class="line"></div>

  <!-- Immagine -->
  <div class="container">
    <div class="coming">Coming soon</div>
    <img src="foto.jpg" alt="Foto">
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://instagram.com/iacopopasqui" target="_blank">Instagram</a>
    <div class="username">@iacopopasqui</div>
  </div>

</body>
</html>
